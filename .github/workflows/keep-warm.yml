name: Keep Spaces Warm

  on:
    schedule:
      - cron: '*/5 * * * *'
    workflow_dispatch:

  jobs:
    ping:
      runs-on: ubuntu-latest
      steps:
        - run: |
            urls=(
              # Core org spaces (MML)
              "https://mml-analysing-shyper-and-api-mid-structer-upload-bot.hf.space/"
              "https://mml-analysing-shyper-and-api-mid-structer-api.hf.space/health"
              "https://mml-analysing-shyper-and-api-mid-structer-db.hf.space/health"
              # Proxy spaces (4 accounts)
              "https://multimedia-cryptography-benchmarks-proxy.hf.space/health"
              "https://rayig-proxy.hf.space/health"
              "https://toolkit-backend-proxy.hf.space/health"
              "https://dgntsnfangskgsjafjyjysjtsjtsjwtjfsjyejyrky-proxy.hf.space/health"
              # Archiver spaces (4 accounts)
              "https://multimedia-cryptography-benchmarks-archiver.hf.space/health"
              "https://rayig-archiver.hf.space/health"
              "https://toolkit-backend-archiver.hf.space/health"
              "https://dgntsnfangskgsjafjyjysjtsjtsjwtjfsjyejyrky-archiver.hf.space/health"
            )
            for url in "${urls[@]}"; do
              echo "Pinging $url"
              curl -sf --max-time 20 "$url" > /dev/null && echo "  OK" || echo "  FAIL (space may be sleeping or starting)"
            done
  