<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="popcorn-body" x1="30" y1="40" x2="90" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF8A5B"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="popcorn-kernel" x1="40" y1="10" x2="80" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Cup -->
  <path d="M35 55 L45 105 L75 105 L85 55 Z" fill="url(#popcorn-body)" stroke="#E85D2E" stroke-width="1.5"/>
  <!-- Cup stripes -->
  <path d="M40 65 L48 100" stroke="#E85D2E" stroke-width="0.8" opacity="0.4"/>
  <path d="M50 58 L55 100" stroke="#E85D2E" stroke-width="0.8" opacity="0.4"/>
  <path d="M60 56 L62 100" stroke="#E85D2E" stroke-width="0.8" opacity="0.4"/>
  <path d="M70 58 L68 100" stroke="#E85D2E" stroke-width="0.8" opacity="0.4"/>
  <!-- Kernels -->
  <circle cx="50" cy="42" r="10" fill="url(#popcorn-kernel)" filter="url(#glow)"/>
  <circle cx="68" cy="38" r="11" fill="url(#popcorn-kernel)" filter="url(#glow)"/>
  <circle cx="58" cy="30" r="9" fill="url(#popcorn-kernel)" filter="url(#glow)"/>
  <circle cx="42" cy="35" r="8" fill="url(#popcorn-kernel)" filter="url(#glow)"/>
  <circle cx="75" cy="44" r="8" fill="url(#popcorn-kernel)" filter="url(#glow)"/>
  <circle cx="60" cy="22" r="7" fill="url(#popcorn-kernel)" filter="url(#glow)"/>
</svg>
