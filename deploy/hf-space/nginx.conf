worker_processes 1;
events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    gzip on;
    server {
        listen 80;
        client_max_body_size 100M;
        location /stream/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_buffering off;
            proxy_read_timeout 120s;
        }
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
